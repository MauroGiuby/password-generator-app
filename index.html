<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <script src="script.js" defer></script>
    
    <title>Frontend Mentor | Password generator app</title>
  </head>
  <body>

    <main>

      <h1>Password Generator</h1>

      <!-- SEZIONE RISULTATO -->
      <section id="result-section">
        <div id="result-div">
          <input type="text" id="password" placeholder="P4$5W0rD!" readonly>

          <button id="copy-btn" aria-label="Copy password">
            <p id="copied-text">COPIED</p>
            <svg width="21" height="24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20.341 3.091 ..."/>
            </svg>
          </button>
        </div>
      </section>

      <!-- SEZIONE FORM -->
      <section>
        <form>

          <!-- LUNGHEZZA -->
          <div id="length-div">
            <div class="label-div">
              <label for="length">Character Length</label>
              <p id="length-text">0</p>
            </div>

            <input type="range" id="length" name="length" min="0" max="20" value="0">
          </div>

          <!-- SCELTE -->
          <fieldset id="choices-div">
            <legend>Character Options</legend>

            <label>
              <input type="checkbox" id="uppercase" name="uppercase">
              Include Uppercase Letters
            </label>

            <label>
              <input type="checkbox" id="lowercase" name="lowercase">
              Include Lowercase Letters
            </label>

            <label>
              <input type="checkbox" id="numbers" name="numbers">
              Include Numbers
            </label>

            <label>
              <input type="checkbox" id="symbols" name="symbols">
              Include Symbols
            </label>
          </fieldset>

          <!-- STRENGTH -->
          <section id="strength-div">
            <p>STRENGTH</p>
            <div>
              <p id="strength-text"></p>
              <div id="strength-grid">
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
              </div>
            </div>
          </section>

          <!-- GENERATE -->
          <button type="button" id="generate-btn">
            GENERATE
            <svg width="12" height="12" xmlns="http://www.w3.org/2000/svg">
              <path d="m5.106 12 ..."/>
            </svg>
          </button>

        </form>
      </section>


    </main>

    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">MauroGiannubilo</a>.
    </footer>


    

  </body>
</html>
